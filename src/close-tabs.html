<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="close-tabs.css" />
  </head>

  <body>
    <script src="set-colors.js"></script>
    <script src="close-tabs.js"></script>

    <div class="panel">
      <div class="panel-header">
        <div class="text-section-header">Close Similar Domain Tabs</div>
      </div>

      <div class="panel-section">
        <input type="radio" name="domain-source" id="domain-source-current" value="current" checked/>
        <label for="domain-source-current">
          Current tab domain (<span id="current-domain-matching-count">0</span> matching tabs)
          <br/>
          <span id="current-domain" class="domain-text">Undetected<span/>
        </label>


        <input type="radio" name="domain-source" id="domain-source-custom" value="custom"/>
        <label for="domain-source-custom">
          Custom tab domain (<span id="custom-domain-matching-count">0</span> matching tabs)
          <input type="text" class="domain-text" id="custom-domain" placeholder="example.com"/>
        </label>
      </div>

      <div class="panel-section">
        <input type="radio" name="match-type" id="match-type-full" value="full" checked />
        <label for="match-type-full">Full domain (matches all sub-domains)</label>

        <input type="radio" name="match-type" id="match-type-subdomain" value="subdomain" />
        <label for="match-type-subdomain">Sub-domain only (exact match)</label>
      </div>

      <div class="panel-section panel-centered">
        <button id="tabs-close">Close matching tabs</button>
      </div>
    </div>

  </body>
</html>
